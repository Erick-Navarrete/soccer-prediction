services:
  - type: web
    name: soccer-predictions
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd web && python app.py
    envVars:
      - key: PORT
        value: 5000
      - key: FLASK_ENV
        value: production
    healthCheckPath: /

# Cron job for scheduled updates (every 6 hours)
crons:
  - name: update-predictions
    schedule: "0 */6 * * *"
    command: python src/update_predictions.py
    envVars:
      - key: FLASK_ENV
        value: production
