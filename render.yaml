services:
- type: web
  name: soccer-predictions
  env: python
  plan: free
  buildCommand: pip install -r requirements.txt && python seed_data.py
  startCommand: gunicorn --chdir web app:app
  envVars:
  - key: PORT
    value: 5000
  - key: FLASK_ENV
    value: production
  - key: FOOTBALL_DATA_API_KEY
    sync: false
  healthCheckPath: /
  # Cron job for scheduled data refresh (6x/day with ESPN real-time results)
  crons:
  - name: update-predictions
    schedule: "0 0,4,8,12,16,20 * * *"
    command: python refresh_data.py
